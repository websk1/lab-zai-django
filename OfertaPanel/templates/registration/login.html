{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - OfertaPanel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'OfertaPanel/panel.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-main);
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            overflow: auto;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            box-shadow: var(--shadow);
            padding: 2.5rem;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo {
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        .login-logo strong {
            font-weight: 700;
            color: #0f172a;
        }
        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .error-message {
            background-color: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .btn-block {
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">Oferta<strong>Panel</strong></div>
            <div class="login-subtitle">Zaloguj się, aby zarządzać ofertą</div>
        </div>

        {% if form.errors %}
            <div class="error-message">
                Niepoprawna nazwa użytkownika lub hasło.
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Nazwa użytkownika</label>
                <input type="text" name="username" autofocus required id="id_username" class="form-control" placeholder="Wprowadź login">
            </div>
            <div class="form-group">
                <label for="id_password">Hasło</label>
                <input type="password" name="password" required id="id_password" class="form-control" placeholder="Wprowadź hasło">
            </div>
            <button type="submit" class="btn-primary btn-block">Zaloguj się</button>
        </form>
    </div>
</body>
</html>
