{% extends 'OfertaPanel/base.html' %}

{% block title %}Dodaj Kategorię - OfertaPanel{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Dodaj Kategorię</h1>
    <p class="page-description">Wypełnij poniższy formularz, aby utworzyć nową kategorię szkoleń.</p>
</div>

<div class="form-card">
    <form method="POST" action="{% url 'dodaj_kategorie' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="nazwa">Nazwa kategorii</label>
            <input type="text" id="nazwa" name="nazwa" class="form-control" placeholder="np. Programowanie w Pythonie" required>
        </div>

        <div class="form-group">
            <label for="kategoria_nadrzedna">Kategoria nadrzędna</label>
            <select id="kategoria_nadrzedna" name="kategoria_nadrzedna" class="form-control">
                <option value="">-- Brak (Kategoria Główna) --</option>
                {% for kat in kategorie %}
                    <option value="{{ kat.id }}">{{ kat.nazwa }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="kolejnosc">Kolejność wyświetlania</label>
            <input type="number" id="kolejnosc" name="kolejnosc" class="form-control" value="0" min="0" required>
        </div>

        <div class="form-group">
            <label class="form-check">
                <input type="checkbox" id="publikuj" name="publikuj" checked>
                Opublikuj kategorię od razu
            </label>
        </div>

        <button type="submit" class="btn-primary">Dodaj Kategorię</button>
    </form>
</div>
{% endblock %}
